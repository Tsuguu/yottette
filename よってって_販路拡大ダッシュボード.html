<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>よってってCAFFE｜販路拡大ダッシュボード</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#F7F1E5; --paper2:#FBF6EC; --card:#FFFFFF;
  --red:#C0392B; --deep:#7B2D26; --gold:#C1953F; --ink:#3A2E2A; --mute:#9C8B7F;
  --green:#2E7D32; --line:#E8DDCB;
  --num:"Outfit",system-ui,sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0}
body{background:var(--paper);color:var(--ink);
  font-family:"Zen Maru Gothic",system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;line-height:1.5}
.wrap{max-width:1080px;margin:0 auto;padding:0 18px 72px}
header{padding:30px 0 18px}
.brandrow{display:flex;align-items:center;gap:12px}
.apple{width:34px;height:34px;flex:0 0 auto}
h1{font-size:23px;margin:0;font-weight:700;letter-spacing:.01em}
.sub{color:var(--mute);font-size:13px;margin:4px 0 0}
.eyebrow{font-family:var(--num);font-weight:600;letter-spacing:.22em;
  text-transform:uppercase;color:var(--gold);font-size:11px;margin-bottom:2px}
.tabs{display:flex;gap:8px;margin:22px 0 6px}
.tab{border:1.5px solid var(--line);background:var(--paper2);color:var(--deep);
  font-family:inherit;font-weight:700;font-size:15px;padding:11px 20px;border-radius:999px;
  cursor:pointer;transition:.15s}
.tab[aria-selected="true"]{background:var(--red);color:#fff;border-color:var(--red);
  box-shadow:0 4px 14px rgba(192,57,43,.25)}
.panel{display:none;animation:fade .25s ease}
.panel.on{display:block}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:18px 0 8px}
.stat{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px 16px 14px;
  box-shadow:0 2px 0 rgba(123,45,38,.04)}
.stat .n{font-family:var(--num);font-weight:700;font-size:38px;line-height:1;color:var(--deep);
  font-variant-numeric:tabular-nums;letter-spacing:-.01em}
.stat .l{font-size:12.5px;color:var(--mute);margin-top:6px}
.stat.accent .n{color:var(--red)}
.sec{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:18px 20px;margin:14px 0}
.sec h2{font-size:15px;margin:0 0 14px;font-weight:700;color:var(--deep);
  display:flex;align-items:center;gap:8px}
.secnum{font-family:var(--num);font-weight:700;color:var(--gold);font-size:15px}
.sec h2 .dot{content:"";width:7px;height:18px;background:var(--gold);border-radius:2px;display:inline-block}
.bars{display:flex;flex-direction:column;gap:9px}
.bar{display:grid;grid-template-columns:120px 1fr 34px;align-items:center;gap:10px;font-size:13px}
.bar .lab{color:var(--ink)}
.bar .track{background:var(--paper);border-radius:8px;height:16px;overflow:hidden}
.bar .fill{height:100%;background:var(--red);border-radius:8px;min-width:3px;transition:width .5s}
.bar .v{font-family:var(--num);font-weight:700;font-size:15px;text-align:right;color:var(--deep);font-variant-numeric:tabular-nums}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.filters{display:flex;flex-wrap:wrap;gap:7px;align-items:center;margin:2px 0 14px}
.chip{border:1.5px solid var(--line);background:var(--paper2);color:var(--deep);border-radius:999px;
  padding:6px 13px;font-size:12.5px;font-family:inherit;font-weight:500;cursor:pointer}
.chip[aria-pressed="true"]{background:var(--deep);color:#fff;border-color:var(--deep)}
.search{margin-left:auto;border:1.5px solid var(--line);border-radius:999px;padding:8px 14px;
  font-family:inherit;font-size:13px;min-width:180px;background:#fff}
.count{color:var(--mute);font-size:12.5px;margin:0 0 10px;font-family:var(--num);font-weight:500}
.pcard{background:var(--paper2);border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin-bottom:10px}
.pcard .ptop{display:flex;align-items:center;gap:9px;flex-wrap:wrap;margin-bottom:9px}
.pcard .nm{font-weight:700;font-size:15px;color:var(--deep)}
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:6px 22px;font-size:13px}
.pgrid .full{grid-column:1/-1}
.pgrid .k{display:inline-block;min-width:44px;color:var(--mute);font-size:11.5px;margin-right:6px}
.pgrid a{color:#4C86C1;text-decoration:none}
.badge{display:inline-block;padding:3px 10px;border-radius:999px;font-size:11.5px;font-weight:700;color:#fff;white-space:nowrap}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{padding:10px 8px;text-align:right;border-bottom:1px solid var(--line)}
th{color:var(--mute);font-weight:500;font-size:11.5px;white-space:nowrap}
td.l,th.l{text-align:left}
td .money{font-family:var(--num);font-weight:700;font-size:16px;color:var(--deep);font-variant-numeric:tabular-nums}
td .num{font-family:var(--num);font-variant-numeric:tabular-nums}
td .net{color:var(--green);font-weight:700}
.pending{color:var(--mute);background:var(--paper);border-radius:6px;padding:2px 8px;font-size:11.5px}
.note{background:#FBF3E6;border:1px solid #EAD9B8;border-radius:12px;padding:12px 14px;font-size:12.5px;color:#7a6748;margin:12px 0}
footer{color:var(--mute);font-size:11.5px;text-align:center;margin-top:30px}
@media(max-width:720px){
  .stats{grid-template-columns:repeat(2,1fr)}
  .grid2{grid-template-columns:1fr}
  .pgrid{grid-template-columns:1fr}
  .bar{grid-template-columns:96px 1fr 30px}
  .search{margin-left:0;width:100%}
  table{font-size:12px}
}
</style>
</head>
<body>
<div class="wrap">
<header>
  <div class="eyebrow">Partners &amp; Sales Channels</div>
  <div class="brandrow">
    <div><h1>よってってCAFFE｜販路拡大ダッシュボード</h1>
    <p class="sub">取引先と、ECチャネルごとの価格・利益をまとめて見るための画面です</p></div>
  </div>
  <div class="tabs" role="tablist">
    <button class="tab" role="tab" aria-selected="true" data-tab="p1">取引先</button>
    <button class="tab" role="tab" aria-selected="false" data-tab="p2">チャネル価格</button>
  </div>
</header>

<section class="panel on" id="p1">
  <div class="stats" id="statcards"></div>
  <div class="grid2">
    <div class="sec"><h2><span class="secnum">01</span>業態別</h2><div class="bars" id="bar-gyotai"></div></div>
    <div class="sec"><h2><span class="secnum">02</span>エリア別</h2><div class="bars" id="bar-area"></div></div>
  </div>
  <div class="sec">
    <h2><span class="secnum">03</span>取引先一覧</h2>
    <div class="filters" id="filters"></div>
    <p class="count" id="count"></p>
    <div id="list"></div>
  </div>
</section>

<section class="panel" id="p2">
  <div class="stats" id="pstats"></div>
  <div class="note">いまは商品と自社の価格だけをまとめています。産直アウル・楽天などの他チャネルは、価格が揃ってから一緒に追加しましょう。</div>
  <div class="sec">
    <h2><span class="secnum">04</span>商品と自社価格</h2>
    <div style="overflow-x:auto">
    <table>
      <thead><tr>
        <th class="l">商品名</th><th>規格</th><th>自社価格</th>
      </tr></thead>
      <tbody id="ptable"></tbody>
    </table>
    </div>
  </div>
</section>

<footer>データ元：顧客管理シート／販売チャネル一覧　｜　管理用Excelの内容から作成。数値を更新したら再作成できます。</footer>
</div>

const AREA=["米沢","置賜(米沢以外)","山形県内(その他)","東北(県外)","関東","関西","その他","—"];
const BADGE={"宿泊・旅館":"#C0392B","飲食店":"#C1953F","小売・スーパー":"#4C86C1","ギフト・卸":"#7B2D26","百貨店・催事":"#8E44AD","EC・通販":"#16A085","自治体・団体":"#5D6D7E","製造・醸造":"#A0522D","その他":"#9C8B7F","要確認":"#B7A99B"};

const yen=n=>n==null?'':'¥'+Number(n).toLocaleString();
const esc=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;');

document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{
  document.querySelectorAll('.tab').forEach(x=>x.setAttribute('aria-selected',x===t));
  document.querySelectorAll('.panel').forEach(p=>p.classList.toggle('on',p.id===t.dataset.tab));
});

const P=DATA.partners;
const cnt=(k,v)=>P.filter(x=>x[k]===v).length;
const cards=[["取引先 総数",P.length,false],["取引中",cnt('status','取引中'),false],
  ["商談中",cnt('status','商談中'),false],["要確認",cnt('status','要確認'),true]];
document.getElementById('statcards').innerHTML=cards.map(c=>
  `<div class="stat ${c[2]?'accent':''}"><div class="n">${c[1]}</div><div class="l">${c[0]}</div></div>`).join('');
function bars(el,keys,key){
  const c=keys.map(k=>[k,cnt(key,k)]).filter(x=>x[1]>0);
  const mx=Math.max(1,...c.map(x=>x[1]));
  el.innerHTML=c.map(([k,v])=>
    `<div class="bar"><div class="lab">${k}</div><div class="track"><div class="fill" style="width:${Math.round(v/mx*100)}%"></div></div><div class="v">${v}</div></div>`).join('');
}
bars(document.getElementById('bar-gyotai'),GYO,'gyotai');
bars(document.getElementById('bar-area'),AREA,'area');
let fG=null;
const fbox=document.getElementById('filters');
const usedG=GYO.filter(g=>cnt('gyotai',g)>0);
fbox.innerHTML=`<button class="chip" aria-pressed="true" data-g="">すべて</button>`+
  usedG.map(g=>`<button class="chip" aria-pressed="false" data-g="${g}">${g}</button>`).join('')+
  `<input class="search" id="q" placeholder="名前で検索">`;
function render(){
  const q=(document.getElementById('q').value||'').trim();
  let rows=P.filter(x=>(!fG||x.gyotai===fG)&&(!q||x.name.includes(q)));
  document.getElementById('count').textContent=`${rows.length} 件を表示`;
  document.getElementById('list').innerHTML=rows.map(x=>{
    const web=x.url?`<div><span class="k">Web</span><a href="${/^https?:/.test(x.url)?x.url:'http://'+x.url}" target="_blank" rel="noopener">${esc(x.url)}</a></div>`:'';
    const memo=x.memo?`<div class="full"><span class="k">メモ</span>${esc(x.memo)}</div>`:'';
    return `<div class="pcard">
      <div class="ptop"><span class="nm">${esc(x.name)}</span>
        <span class="badge" style="background:${BADGE[x.gyotai]||'#9C8B7F'}">${x.gyotai}</span>
        <span class="badge" style="background:${STBADGE[x.status]||'#B7A99B'}">${x.status}</span></div>
      <div class="pgrid">
        <div><span class="k">担当</span>${esc(x.tanto)||'—'}</div>
        <div><span class="k">電話</span>${esc(x.tel)||'—'}</div>
        <div><span class="k">エリア</span>${x.area}</div>
        <div class="full"><span class="k">住所</span>${esc(x.addr)||'—'}</div>
        ${web}${memo}
      </div></div>`;}).join('')||'<p class="count">該当なし</p>';
}
fbox.querySelectorAll('.chip').forEach(c=>c.onclick=()=>{
  fbox.querySelectorAll('.chip').forEach(x=>x.setAttribute('aria-pressed','false'));
  c.setAttribute('aria-pressed','true'); fG=c.dataset.g||null; render();
});
document.getElementById('q').addEventListener('input',render);
render();

const PRD=DATA.products;
const withHP=PRD.filter(x=>x.hp!=null);
const avg=a=>a.length?Math.round(a.reduce((s,v)=>s+v,0)/a.length):0;
const pcards=[["商品数",PRD.length],["価格 登録済み",withHP.length],
  ["自社 平均価格",yen(avg(withHP.map(x=>x.hp)))]];
document.getElementById('pstats').innerHTML=pcards.map(c=>
  `<div class="stat"><div class="n" style="font-size:${String(c[1]).length>4?'26px':'38px'}">${c[1]}</div><div class="l">${c[0]}</div></div>`).join('');
document.getElementById('ptable').innerHTML=PRD.map(x=>`
  <tr>
    <td class="l" style="font-weight:700;color:var(--deep)">${esc(x.name)}</td>
    <td class="num" style="color:var(--mute)">${esc(x.kikaku)}</td>
    <td><span class="money">${x.hp!=null?yen(x.hp):''}</span></td>
  </tr>`).join('');
</script>
